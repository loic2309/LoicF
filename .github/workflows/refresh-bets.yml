name: Refresh WC2026 betting picks

# Runs every morning at 06:00 UTC (08:00 Belgian time, CEST) so the live page
# always reflects the current Belgian-day window before kickoffs. Also
# triggerable manually from the Actions tab.
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-bets
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: unibet-bets
    steps:
      - name: Hold gate (preserve Day 1 simple picks until 2026-06-12)
        id: gate
        run: |
          today=$(date -u +%Y-%m-%d)
          # The deep-rework logic kicks in from 2026-06-12 onwards. Before
          # that date we skip the refresh so the live snapshot stays on the
          # original Day 1 picks (Mexico-SA + South Korea-Czech).
          if [[ "$today" < "2026-06-12" ]]; then
            echo "🛑 Refresh gated until 2026-06-12. Today=$today."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "✓ Past the gate, running normal refresh. Today=$today."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != 'true'

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.skip != 'true'
        with:
          python-version: '3.11'

      - name: Refresh Elo ratings TSV
        if: steps.gate.outputs.skip != 'true'
        run: |
          curl -fsS -H "User-Agent: Mozilla/5.0" \
            "https://www.eloratings.net/World.tsv" -o data/elo_raw.tsv || \
            echo "(elo refresh skipped — keeping last known TSV)"

      - name: Update tournament results
        if: steps.gate.outputs.skip != 'true'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python3 -c "
          import sys; sys.path.insert(0, 'src')
          from fetch_results import update_results
          summary = update_results(days_from=4)
          print(summary)
          "

      - name: Regenerate page with fresh odds
        if: steps.gate.outputs.skip != 'true'
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: |
          python3 run.py --force
          cp bets.html index.html

      - name: Commit & push if changed
        if: steps.gate.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f index.html data/picks_history.json data/results_history.json data/elo_raw.tsv 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
          else
            git commit -m "auto: daily refresh $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
